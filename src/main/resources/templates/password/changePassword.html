<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{/common/layout :: layout(~{::title},~{::body/content()})}">

<title>パスワード変更</title>

<body>
    <div class="container">

       <div class="title">
         <h1>パスワード変更</h1>
       </div>
        <form class="display-inline"
            th:action="@{/password/changePassword}"
            method="post"
            onsubmit="return updatecheck()"
            id="login-form"
            data-validate
            >
            <div class="colmun_common">
                <div class="left_label">
                    <label>ID</label>
                    <label>現在のパスワード</label>
                    <label>新しいパスワード</label>
                    <label>確認用パスワード</label>
                </div>
                    <div class="right_textbox" th:object="${passwordForm}">
                        <input type="text" class="textbox"
                            size="40"
                            id="inputUserId"
                            th:value="*{userId}"
                            name="userId"
                            disabled
                            >
                            <input type="hidden" name="userId" th:value="*{userId}">
                        <input type="password" class="textbox check"
                            size="40"
                            th:value="*{password}"
                            name="password"
                            th:classappend="${#fields.hasErrors('password') ? 'errorTextbox' : ''}"
                            th:disabled="${exclusiveControl != null && exclusiveControl}"
                            id="input1"
                            required validate[required]
                            >
                        <input type="password" class="textbox check"
                            size="40"
                            th:value="*{newPassword}"
                            name="newPassword"
                            th:classappend="${#fields.hasErrors('newPassword') ? 'errorTextbox' : ''}"
                            th:disabled="${exclusiveControl != null && exclusiveControl}"
                            id="input2"
                            required validate[required]
                            >
                        <input type="password" class="textbox check"
                            size="40"
                            th:value="*{checkPassword}"
                            name="checkPassword"
                            th:classappend="${#fields.hasErrors('newPassword') ? 'errorTextbox' : ''}"
                            th:disabled="${exclusiveControl != null && exclusiveControl}"
                            id="input3"
                            required validate[required]
                            >
                        <span class="attention">*パスワードは英文字(大文字、小文字)、数字、記号を全て含む10文字～20文字にしてください。
                            </span>
                    </div>
            </div>
            <br>
        </form>
    </div>
    <footer>
        <div class="right">
            <input type="submit" value="更新"
                name="updateButton"
                class="button"
                id="submit1"
                form="login-form"
                disabled
                >
        </div>
     </footer>
    <!--/* オーバーレイ */-->
    <div id="overlay"></div>

    <!--/* エラーダイアログ */-->
    <div id="errorAlert" th:object="${passwordForm}">

        <span th:if="${completeMessage} != null"
              th:text="${completeMessage}"
              class="errorMessage"
              style="color: #003366;"></span>

        <!-- passwordのエラーメッセージ -->
        <div th:if="${#fields.hasErrors('password')}">
                <span th:errors="*{password}" class="errorMessage"></span>
        </div>
        <!-- newPasswordのエラーメッセージ -->
        <div th:if="${#fields.hasErrors('newPassword')}">
                <span th:errors="*{newPassword}" class="errorMessage"></span>
        </div>
        <!-- checkPasswordのエラーメッセージ -->
        <div th:if="${#fields.hasErrors('checkPassword')}">
                <span th:errors="*{checkPassword}" class="errorMessage"></span>
        </div>

        <div th:each="error:${#fields.detailedErrors()}" th:if="${exclusiveControl}">
            <span th:text="${error.message}" class="errorMessage"></span>
        </div>
          <button id="okButton" onclick="closeAlert('')">OK</button>
        </div>

    <script>

        // 存在するidの情報をaccに格納する
        const inputs = ['input1', 'input2', 'input3']
            .reduce((acc, id) => {
                // 各入力要素を取得し、存在する場合はその値を保存
                const $el = $("#" + id);
                if ($el.length) acc[id] = $el.val(); // 値があればaccオブジェクトに追加
                return acc;
            }, {}); // 空のオブジェクトからスタート

        // 入力値のチェックを行う関数
        function inputCheck(inputElement) {
            // 必須項目（class="check"）がすべて入力されているか確認
            const allCheckValid = $('.check').toArray().every(el =>
                $(el).val() !== ""
            );

            // 入力値が変更されているか確認（初期値と比較）
            const changeCheckValid = $('.check').toArray().some(el =>
                inputs[$(el).attr('id')] !== $(el).val() // 初期値と現在の値を比較
            );

            if (allCheckValid && changeCheckValid) {
                $("input[name='updateButton']").prop('disabled', false);
            } else {
                $("input[name='updateButton']").prop('disabled', true);
            }
        }
        //更新ボタン活性・非活性
        $(function () {
            $('form[data-validate]').on('input change', function () {
                inputCheck(this);
            });
        });

        // 初期表示の処理
        jQuery(function ($) {
            // エラーがあるかどうか
            if ($('.errorMessage').length > 0) {
                errorAlert();
            }
        });
    </script>
</body>

</html>
